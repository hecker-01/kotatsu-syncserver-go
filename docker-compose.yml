version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: kotatsu-mysql
    env_file:
      - .env
    environment:
      # MySQL-specific environment variables
      MYSQL_ROOT_PASSWORD: ${DATABASE_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DATABASE_NAME:-kotatsu_db}
      MYSQL_USER: ${DATABASE_USER}
      MYSQL_PASSWORD: ${DATABASE_PASSWORD}
    ports:
      - "${DATABASE_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DATABASE_ROOT_PASSWORD}"]
      timeout: 5s
      retries: 10

  kotatsu-server:
    build: .
    container_name: kotatsu-server
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "${PORT:-9292}:${PORT:-9292}"
    env_file:
      - .env
    environment:
      # Override DATABASE_HOST for container networking
      DATABASE_HOST: mysql
    restart: unless-stopped

volumes:
  mysql_data:
